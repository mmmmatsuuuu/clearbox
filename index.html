<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>メタクエスト - 魔王とメモリ安全の姫</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #111;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        gap: 12px;
      }
      #game-container canvas {
        display: block;
      }
      #ui-buttons {
        display: flex;
        gap: 12px;
      }
      button {
        padding: 8px 28px;
        font-size: 15px;
        font-family: monospace;
        cursor: pointer;
        background: #1a1a2e;
        color: #ffffff;
        border: 2px solid #4a4a6a;
        border-radius: 4px;
        letter-spacing: 1px;
      }
      button:hover {
        background: #2a2a4e;
        border-color: #8888cc;
      }
    </style>
    <script type="module" crossorigin src="/clearbox/assets/index-DeQs6yAV.js"></script>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="ui-buttons">
      <button id="save-btn">セーブ</button>
      <button id="load-btn">ロード</button>
    </div>
  </body>
</html>

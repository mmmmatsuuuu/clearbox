<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>メタクエスト - 魔王とメモリ安全の姫</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      #wrapper {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 16px;
      }
      #game-container canvas {
        display: block;
      }
      #side-panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding-top: 4px;
      }
      #ui-buttons {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      button {
        padding: 8px 0;
        width: 120px;
        font-size: 15px;
        font-family: monospace;
        cursor: pointer;
        background: #1a1a2e;
        color: #ffffff;
        border: 2px solid #4a4a6a;
        border-radius: 4px;
        letter-spacing: 1px;
      }
      button:hover {
        background: #2a2a4e;
        border-color: #8888cc;
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <div id="game-container"></div>
      <div id="side-panel">
        <div id="ui-buttons">
          <button id="save-btn">セーブ</button>
          <button id="load-btn">ロード</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
